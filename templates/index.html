<!DOCTYPE html>
<html>
<head>
    <title>ICU死亡预测计算器</title>
</head>
<body>

<h2>ICU 28天死亡风险预测</h2>

<form method="post">
    {% for feature in feature_names %}
        <label>{{ feature }}</label><br>
        <input type="number" step="any" name="{{ feature }}" required><br><br>
    {% endfor %}

    <input type="submit" value="计算">
</form>

{% if prediction %}
    <h3>预测死亡概率: {{ prediction }}</h3>
{% endif %}

</body>
</html>
